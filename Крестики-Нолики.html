<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики - Выбор устройства</title>
    <style>
        :root {
            --bg-start: #0f172a;
            --bg-mid: #1e293b;
            --bg-end: #0b1120;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.18);
            --text-main: #e2e8f0;
            --text-soft: #94a3b8;
            --accent: #38bdf8;
            --accent-2: #2563eb;
            --shadow: 0 20px 50px rgba(2, 6, 23, 0.5);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            background: radial-gradient(circle at 15% 15%, #1d4ed8 0%, transparent 45%),
                        radial-gradient(circle at 85% 75%, #7c3aed 0%, transparent 40%),
                        linear-gradient(140deg, var(--bg-start), var(--bg-mid), var(--bg-end));
            overflow: hidden;
        }

        .chooser-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
            background: rgba(2, 6, 23, 0.68);
            backdrop-filter: blur(8px);
        }

        .chooser-card {
            width: min(95vw, 560px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            padding: 28px;
            text-align: center;
        }

        .chooser-card h1 {
            margin: 0 0 10px;
            font-size: clamp(1.6rem, 4.8vw, 2.2rem);
        }

        .chooser-card p {
            margin: 0 0 22px;
            color: var(--text-soft);
            font-size: 1rem;
        }

        .device-buttons {
            display: grid;
            gap: 12px;
        }

        .device-btn {
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.65);
            color: var(--text-main);
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.2s ease, border-color 0.2s ease;
        }

        .device-btn.primary {
            background: linear-gradient(140deg, var(--accent), var(--accent-2));
            border-color: rgba(56, 189, 248, 0.8);
            color: #eff6ff;
        }

        .device-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        #gameFrame {
            position: fixed;
            left: 0;
            right: 0;
            top: -2px;
            width: 100%;
            height: calc(100dvh + 4px);
            border: 0;
            display: none;
            background: radial-gradient(circle at 15% 15%, #1d4ed8 0%, transparent 45%),
                        radial-gradient(circle at 85% 75%, #7c3aed 0%, transparent 40%),
                        linear-gradient(140deg, var(--bg-start), var(--bg-mid), var(--bg-end));
            transform: translateZ(0);
            overflow: hidden;
        }

        #switchDeviceBtn {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 20;
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-main);
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: none;
            transition: transform 0.15s ease, filter 0.2s ease;
        }

        #switchDeviceBtn:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }
    </style>
</head>
<body>
    <div class="chooser-overlay" id="chooserOverlay">
        <div class="chooser-card">
            <h1>Крестики-Нолики</h1>
            <p>Выберите устройство, чтобы открыть подходящий интерфейс:</p>
            <div class="device-buttons">
                <button class="device-btn primary" id="phoneBtn">Телефон</button>
                <button class="device-btn" id="desktopBtn">Компьютер</button>
            </div>
        </div>
    </div>

<body>
    <div class="game-container">
        <h1>Крестики-Нолики</h1>
        <div class="controls">
            <div class="control-row">
                <label for="modeSelect">Режим игры</label>
                <select id="modeSelect"><option value="pvp">Игрок vs Игрок</option><option value="ai">Игрок vs Бот</option></select>
            </div>
            <div class="control-row" id="difficultyRow">
                <label for="difficultySelect">Сложность бота</label>
                <select id="difficultySelect"><option value="easy">Легко</option><option value="normal">Нормально</option><option value="hard">Сложно</option></select>
            </div>
            <div class="control-row"><button id="undoBtn">Отменить ход</button><button id="resetScoreBtn">Сбросить счет</button></div>
        </div>
        <div class="scoreboard">
            <div class="score-item">Победы X<strong id="scoreX">0</strong></div>
            <div class="score-item">Победы O<strong id="scoreO">0</strong></div>
            <div class="score-item">Ничьи<strong id="scoreDraw">0</strong></div>
        </div>
        <div class="status" id="status">Ход игрока X</div>
        <div class="game-board" id="board">
            <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
        </div>
        <div class="action-buttons"><button class="reset-btn" id="resetBtn">Начать заново</button></div>
    </div>
    <script>
        var cells = document.querySelectorAll('.cell');
        var statusText = document.getElementById('status');
        var resetBtn = document.getElementById('resetBtn');
        var undoBtn = document.getElementById('undoBtn');
        var resetScoreBtn = document.getElementById('resetScoreBtn');
        var modeSelect = document.getElementById('modeSelect');
        var difficultyRow = document.getElementById('difficultyRow');
        var difficultySelect = document.getElementById('difficultySelect');
        var scoreXElement = document.getElementById('scoreX');
        var scoreOElement = document.getElementById('scoreO');
        var scoreDrawElement = document.getElementById('scoreDraw');
        var currentPlayer = "X", gameActive = true, gameState = ["","","","","","","","",""], mode = "pvp", moveHistory = [], botThinking = false, scores = loadScores(), audioCtx = null;
        saveScores();
        var winningConditions = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        updateScoreUI(); updateStatus(); updateDifficultyVisibility();
        function ensureAudioContext(){ if(!audioCtx){ const A=window.AudioContext||window.webkitAudioContext; if(!A) return null; audioCtx=new A(); } if(audioCtx.state==="suspended"){ audioCtx.resume(); } return audioCtx; }
        function playTone(f,d,t="sine",v=0.06,s=0){ const c=ensureAudioContext(); if(!c) return; const n=c.currentTime+s,o=c.createOscillator(),g=c.createGain(); o.type=t; o.frequency.setValueAtTime(f,n); g.gain.setValueAtTime(0.0001,n); g.gain.exponentialRampToValueAtTime(v,n+0.01); g.gain.exponentialRampToValueAtTime(0.0001,n+d); o.connect(g); g.connect(c.destination); o.start(n); o.stop(n+d+0.02);}
        function playMoveSound(p){ p==="X"?playTone(520,0.08,"square",0.04):playTone(420,0.1,"triangle",0.045); }
        function playWinSound(){ playTone(523,0.09,"triangle",0.055,0); playTone(659,0.1,"triangle",0.055,0.08); playTone(784,0.14,"triangle",0.06,0.16); }
        function playDrawSound(){ playTone(360,0.1,"sine",0.045,0); playTone(320,0.1,"sine",0.045,0.08); }
        function playInvalidSound(){ playTone(190,0.07,"sawtooth",0.03); }
        function handleCellClick(e){ const c=e.target,i=parseInt(c.getAttribute('data-index')); if(gameState[i]!==""||!gameActive||botThinking){ playInvalidSound(); return; } if(mode==="ai"&&currentPlayer==="O"){ playInvalidSound(); return; } updateCell(c,i); checkResult(); if(gameActive&&mode==="ai"&&currentPlayer==="O"){ runBotTurn(); } }
        function updateCell(c,i){ gameState[i]=currentPlayer; c.innerText=currentPlayer; c.classList.add(currentPlayer.toLowerCase()); moveHistory.push(i); playMoveSound(currentPlayer); }
        function changePlayer(){ currentPlayer=currentPlayer==="X"?"O":"X"; updateStatus(); }
        function checkResult(){ let w=false,combo=null; for(let i=0;i<winningConditions.length;i++){ const [a,b,c]=winningConditions[i]; if(gameState[a]&&gameState[a]===gameState[b]&&gameState[a]===gameState[c]){ w=true; combo=[a,b,c]; break; } } if(w){ statusText.innerText=`Игрок ${currentPlayer} ПОБЕДИЛ!`; statusText.style.color="#2ecc71"; gameActive=false; combo.forEach(i=>cells[i].classList.add('winner')); updateScores(currentPlayer); playWinSound(); return; } if(!gameState.includes("")){ statusText.innerText="НИЧЬЯ!"; statusText.style.color="#fdbb2d"; gameActive=false; updateScores("draw"); playDrawSound(); return; } changePlayer(); }
        function restartGame(){ currentPlayer="X"; gameActive=true; botThinking=false; gameState=["","","","","","","","",""]; moveHistory=[]; updateStatus(); cells.forEach(c=>{ c.innerText=""; c.classList.remove('x','o','winner'); });}
        function undoMove(){ if(!moveHistory.length||!gameActive||botThinking){ return; } const i=moveHistory.pop(); gameState[i]=""; cells[i].innerText=""; cells[i].classList.remove('x','o','winner'); currentPlayer=currentPlayer==="X"?"O":"X"; updateStatus(); }
        function updateStatus(){ if(!gameActive) return; if(mode==="ai"&&currentPlayer==="O"){ statusText.innerText="Ход бота O..."; statusText.style.color="var(--o-color)"; return; } statusText.innerText=`Ход игрока ${currentPlayer}`; statusText.style.color="var(--text-main)"; }
        function updateScores(w){ if(w==="X") scores.x+=1; if(w==="O") scores.o+=1; if(w==="draw") scores.draw+=1; saveScores(); updateScoreUI(); }
        function updateScoreUI(){ scoreXElement.innerText=scores.x; scoreOElement.innerText=scores.o; scoreDrawElement.innerText=scores.draw; }
        function loadScores(){ try{ const s=JSON.parse(localStorage.getItem("tttScores")); if(s&&typeof s.x==="number"&&typeof s.o==="number"&&typeof s.draw==="number"){ return { x: 0, o: s.o, draw: 0 }; } }catch(error){} return { x:0,o:0,draw:0}; }
        function saveScores(){ localStorage.setItem("tttScores", JSON.stringify(scores)); }
        function updateDifficultyVisibility(){ const ai=mode==="ai"; difficultySelect.disabled=!ai; difficultyRow.style.display=ai?"flex":"none"; }
        function availableMoves(state=gameState){ const moves=[]; state.forEach((v,i)=>{ if(!v) moves.push(i); }); return moves; }
        function runBotTurn(){ botThinking=true; updateStatus(); setTimeout(()=>{ const move=getBotMove(); if(move!==null&&gameActive){ updateCell(cells[move],move); checkResult(); } botThinking=false; updateStatus(); },500); }
        function getBotMove(){ const m=availableMoves(); if(!m.length) return null; const d=difficultySelect.value; if(d==="easy") return m[Math.floor(Math.random()*m.length)]; if(d==="normal"&&Math.random()<0.45) return m[Math.floor(Math.random()*m.length)]; return getBestMoveForO(gameState); }
        function getBestMoveForO(state){ let best=-Infinity,move=null; for(const m of availableMoves(state)){ state[m]="O"; const sc=minimax(state,0,false); state[m]=""; if(sc>best){ best=sc; move=m; } } return move; }
        function minimax(state,depth,max){ const r=getTerminalResult(state); if(r!==null){ if(r==="O") return 10-depth; if(r==="X") return depth-10; return 0; } if(max){ let best=-Infinity; for(const m of availableMoves(state)){ state[m]="O"; best=Math.max(best,minimax(state,depth+1,false)); state[m]=""; } return best; } let best=Infinity; for(const m of availableMoves(state)){ state[m]="X"; best=Math.min(best,minimax(state,depth+1,true)); state[m]=""; } return best; }
        function getTerminalResult(state){ for(const [a,b,c] of winningConditions){ if(state[a]&&state[a]===state[b]&&state[a]===state[c]) return state[a]; } return state.includes("")?null:"draw"; }
        cells.forEach(c => c.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', restartGame);
        undoBtn.addEventListener('click', undoMove);
        resetScoreBtn.addEventListener('click', () => { scores = { x: 0, o: 0, draw: 0 }; saveScores(); updateScoreUI(); });
        modeSelect.addEventListener('change', () => { mode = modeSelect.value; updateDifficultyVisibility(); restartGame(); });
    </script>
</body>
</html>

            .game-container { width:min(96vw,1060px); display:grid; grid-template-columns:340px minmax(420px,1fr); grid-template-areas:"title board" "controls board" "score board" "status board" "actions board"; gap:16px 24px; align-items:start; text-align:left; padding:30px; }
            h1 { grid-area:title; margin:0; font-size:2.2rem; }
            .controls { grid-area:controls; margin-bottom:0; }
            .control-row { flex-wrap:nowrap; }
            .control-row label { min-width:120px; }
            .control-row select, .control-row button { width:100%; }
            .scoreboard { grid-area:score; margin-bottom:0; }
            .status { grid-area:status; margin-bottom:0; }
            .game-board { grid-area:board; margin:0 auto; width:min(100%,620px); gap:16px; padding:18px; border-radius:22px; }
            .cell { font-size:clamp(3rem,4.5vw,4.5rem); border-radius:18px; }
            .action-buttons { grid-area:actions; justify-content:flex-start; margin-top:0; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Крестики-Нолики</h1>
        <div class="controls">
            <div class="control-row"><label for="modeSelect">Режим игры</label><select id="modeSelect"><option value="pvp">Игрок vs Игрок</option><option value="ai">Игрок vs Бот</option></select></div>
            <div class="control-row" id="difficultyRow"><label for="difficultySelect">Сложность бота</label><select id="difficultySelect"><option value="easy">Легко</option><option value="normal">Нормально</option><option value="hard">Сложно</option></select></div>
            <div class="control-row"><button id="undoBtn">Отменить ход</button><button id="resetScoreBtn">Сбросить счет</button></div>
        </div>
        <div class="scoreboard"><div class="score-item">Победы X<strong id="scoreX">0</strong></div><div class="score-item">Победы O<strong id="scoreO">0</strong></div><div class="score-item">Ничьи<strong id="scoreDraw">0</strong></div></div>
        <div class="status" id="status">Ход игрока X</div>
        <div class="game-board" id="board">
            <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
        </div>
        <div class="action-buttons"><button class="reset-btn" id="resetBtn">Начать заново</button></div>
    </div>
    <script>
        var cells = document.querySelectorAll('.cell');
        var statusText = document.getElementById('status');
        var resetBtn = document.getElementById('resetBtn');
        var undoBtn = document.getElementById('undoBtn');
        var resetScoreBtn = document.getElementById('resetScoreBtn');
        var modeSelect = document.getElementById('modeSelect');
        var difficultyRow = document.getElementById('difficultyRow');
        var difficultySelect = document.getElementById('difficultySelect');
        var scoreXElement = document.getElementById('scoreX');
        var scoreOElement = document.getElementById('scoreO');
        var scoreDrawElement = document.getElementById('scoreDraw');
        var currentPlayer = "X", gameActive = true, gameState = ["","","","","","","","",""], mode = "pvp", moveHistory = [], botThinking = false, scores = loadScores(), audioCtx = null;
        var winningConditions = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        updateScoreUI(); updateStatus(); updateDifficultyVisibility();
        function ensureAudioContext(){ if(!audioCtx){ const A=window.AudioContext||window.webkitAudioContext; if(!A) return null; audioCtx=new A(); } if(audioCtx.state==="suspended"){ audioCtx.resume(); } return audioCtx; }
        function playTone(f,d,t="sine",v=0.06,s=0){ const c=ensureAudioContext(); if(!c) return; const n=c.currentTime+s,o=c.createOscillator(),g=c.createGain(); o.type=t; o.frequency.setValueAtTime(f,n); g.gain.setValueAtTime(0.0001,n); g.gain.exponentialRampToValueAtTime(v,n+0.01); g.gain.exponentialRampToValueAtTime(0.0001,n+d); o.connect(g); g.connect(c.destination); o.start(n); o.stop(n+d+0.02);}
        function playMoveSound(p){ p==="X"?playTone(520,0.08,"square",0.04):playTone(420,0.1,"triangle",0.045); }
        function playWinSound(){ playTone(523,0.09,"triangle",0.055,0); playTone(659,0.1,"triangle",0.055,0.08); playTone(784,0.14,"triangle",0.06,0.16); }
        function playDrawSound(){ playTone(360,0.1,"sine",0.045,0); playTone(320,0.1,"sine",0.045,0.08); }
        function playInvalidSound(){ playTone(190,0.07,"sawtooth",0.03); }
        function handleCellClick(e){ const c=e.target,i=parseInt(c.getAttribute('data-index')); if(gameState[i]!==""||!gameActive||botThinking){ playInvalidSound(); return; } if(mode==="ai"&&currentPlayer==="O"){ playInvalidSound(); return; } updateCell(c,i); checkResult(); if(gameActive&&mode==="ai"&&currentPlayer==="O"){ runBotTurn(); } }
        function updateCell(c,i){ gameState[i]=currentPlayer; c.innerText=currentPlayer; c.classList.add(currentPlayer.toLowerCase()); moveHistory.push(i); playMoveSound(currentPlayer); }
        function changePlayer(){ currentPlayer=currentPlayer==="X"?"O":"X"; updateStatus(); }
        function checkResult(){ let w=false,combo=null; for(let i=0;i<winningConditions.length;i++){ const [a,b,c]=winningConditions[i]; if(gameState[a]&&gameState[a]===gameState[b]&&gameState[a]===gameState[c]){ w=true; combo=[a,b,c]; break; } } if(w){ statusText.innerText=`Игрок ${currentPlayer} ПОБЕДИЛ!`; statusText.style.color="#2ecc71"; gameActive=false; combo.forEach(i=>cells[i].classList.add('winner')); updateScores(currentPlayer); playWinSound(); return; } if(!gameState.includes("")){ statusText.innerText="НИЧЬЯ!"; statusText.style.color="#fdbb2d"; gameActive=false; updateScores("draw"); playDrawSound(); return; } changePlayer(); }
        function restartGame(){ currentPlayer="X"; gameActive=true; botThinking=false; gameState=["","","","","","","","",""]; moveHistory=[]; updateStatus(); cells.forEach(c=>{ c.innerText=""; c.classList.remove('x','o','winner'); });}
        function undoMove(){ if(!moveHistory.length||!gameActive||botThinking){ return; } const i=moveHistory.pop(); gameState[i]=""; cells[i].innerText=""; cells[i].classList.remove('x','o','winner'); currentPlayer=currentPlayer==="X"?"O":"X"; updateStatus(); }
        function updateStatus(){ if(!gameActive) return; if(mode==="ai"&&currentPlayer==="O"){ statusText.innerText="Ход бота O..."; statusText.style.color="var(--o-color)"; return; } statusText.innerText=`Ход игрока ${currentPlayer}`; statusText.style.color="var(--text-main)"; }
        function updateScores(w){ if(w==="X") scores.x+=1; if(w==="O") scores.o+=1; if(w==="draw") scores.draw+=1; saveScores(); updateScoreUI(); }
        function updateScoreUI(){ scoreXElement.innerText=scores.x; scoreOElement.innerText=scores.o; scoreDrawElement.innerText=scores.draw; }
        function loadScores(){ try{ const s=JSON.parse(localStorage.getItem("tttScores")); if(s&&typeof s.x==="number"&&typeof s.o==="number"&&typeof s.draw==="number"){ return s; } }catch(error){} return { x:0,o:0,draw:0}; }
        function saveScores(){ localStorage.setItem("tttScores", JSON.stringify(scores)); }
        function updateDifficultyVisibility(){ const ai=mode==="ai"; difficultySelect.disabled=!ai; difficultyRow.style.display=ai?"flex":"none"; }
        function availableMoves(state=gameState){ const moves=[]; state.forEach((v,i)=>{ if(!v) moves.push(i); }); return moves; }
        function runBotTurn(){ botThinking=true; updateStatus(); setTimeout(()=>{ const move=getBotMove(); if(move!==null&&gameActive){ updateCell(cells[move],move); checkResult(); } botThinking=false; updateStatus(); },500); }
        function getBotMove(){ const m=availableMoves(); if(!m.length) return null; const d=difficultySelect.value; if(d==="easy") return m[Math.floor(Math.random()*m.length)]; if(d==="normal"&&Math.random()<0.45) return m[Math.floor(Math.random()*m.length)]; return getBestMoveForO(gameState); }
        function getBestMoveForO(state){ let best=-Infinity,move=null; for(const m of availableMoves(state)){ state[m]="O"; const sc=minimax(state,0,false); state[m]=""; if(sc>best){ best=sc; move=m; } } return move; }
        function minimax(state,depth,max){ const r=getTerminalResult(state); if(r!==null){ if(r==="O") return 10-depth; if(r==="X") return depth-10; return 0; } if(max){ let best=-Infinity; for(const m of availableMoves(state)){ state[m]="O"; best=Math.max(best,minimax(state,depth+1,false)); state[m]=""; } return best; } let best=Infinity; for(const m of availableMoves(state)){ state[m]="X"; best=Math.min(best,minimax(state,depth+1,true)); state[m]=""; } return best; }
        function getTerminalResult(state){ for(const [a,b,c] of winningConditions){ if(state[a]&&state[a]===state[b]&&state[a]===state[c]) return state[a]; } return state.includes("")?null:"draw"; }
        cells.forEach(c => c.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', restartGame);
        undoBtn.addEventListener('click', undoMove);
        resetScoreBtn.addEventListener('click', () => { scores = { x: 0, o: 0, draw: 0 }; saveScores(); updateScoreUI(); });
        modeSelect.addEventListener('change', () => { mode = modeSelect.value; updateDifficultyVisibility(); restartGame(); });
    </script>
</body>
</html>
    </template>

    <iframe id="gameFrame" title="Крестики-Нолики"></iframe>
    <button id="switchDeviceBtn" type="button">Сменить устройство</button>

    <script>
        const chooserOverlay = document.getElementById("chooserOverlay");
        const gameFrame = document.getElementById("gameFrame");
        const phoneBtn = document.getElementById("phoneBtn");
        const desktopBtn = document.getElementById("desktopBtn");
        const switchDeviceBtn = document.getElementById("switchDeviceBtn");
        const phoneGameTemplate = document.getElementById("phoneGameTemplate");
        const desktopGameTemplate = document.getElementById("desktopGameTemplate");

        function openGame(deviceType) {
            const template = deviceType === "phone" ? phoneGameTemplate : desktopGameTemplate;
            gameFrame.srcdoc = template.innerHTML.trim();
            gameFrame.style.display = "block";
            chooserOverlay.style.display = "none";
            switchDeviceBtn.style.display = "inline-block";
        }

        function showDeviceChooser() {
            gameFrame.style.display = "none";
            gameFrame.srcdoc = "";
            chooserOverlay.style.display = "flex";
            switchDeviceBtn.style.display = "none";
        }

        phoneBtn.addEventListener("click", () => {
            openGame("phone");
        });

        desktopBtn.addEventListener("click", () => {
            openGame("desktop");
        });

        switchDeviceBtn.addEventListener("click", showDeviceChooser);
    </script>
</body>
</html>
